<div class="mt-3" id="semantic-search-results">
    <div class="d-flex justify-content-between align-items-center mb-2">
        <h6 class="mb-0 fw-bold text-primary"><i class="bi bi-robot"></i> Anlamsal Sonuçlar: "{{ query }}"</h6>
        <button type="button" class="btn-close btn-sm" onclick="document.getElementById('semantic-search-results').remove()"></button>
    </div>
    
    <div class="list-group shadow-sm border-primary">
        {% for res in results %}
        <a href="{% url 'itempool:item_detail' res.item.instances.first.id %}" class="list-group-item list-group-item-action border-start border-4 border-{% if res.score >= 90 %}danger{% elif res.score >= 80 %}warning{% else %}primary{% endif %}">
            <div class="d-flex w-100 justify-content-between align-items-center mb-1">
                <span class="fw-bold">#{{ res.item.id }}</span>
                <span class="badge bg-{% if res.score >= 90 %}danger{% elif res.score >= 80 %}warning{% else %}primary{% endif %}">
                    %{{ res.score }} Benzerlik
                </span>
            </div>
            <p class="mb-1 small text-muted">{{ res.item.stem|truncatechars:180 }}</p>
            <div class="small fw-bold text-info fst-italic">{{ res.label }}</div>
        </a>
        {% empty %}
        <div class="list-group-item text-center py-4 text-muted border-dashed">
            <i class="bi bi-search-heart d-block fs-2 mb-2 text-primary opacity-50"></i>
            Bu havuzda uygun anlamsal sonuç bulunamadı.
        </div>
        {% endfor %}
    </div>
    <div class="mt-2 text-center">
        <button class="btn btn-sm btn-link text-decoration-none" onclick="document.getElementById('semantic-search-results').remove()">Sonuçları Temizle</button>
    </div>
</div>
