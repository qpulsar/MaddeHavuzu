<tr id="outcome-{{ oc.id }}">
    <td class="text-muted">{{ oc.order }}</td>
    <td><span class="badge bg-primary">{{ oc.code }}</span></td>
    <td class="small">{{ oc.description }}</td>
    <td><span class="badge bg-info text-dark">{{ oc.get_level_display }}</span></td>
    <td>
        <div class="btn-group">
            <button class="btn btn-sm btn-light border py-0 px-1"
                    hx-get="{% url 'itempool:outcome_edit' oc.id %}"
                    hx-target="#outcome-{{ oc.id }}"
                    hx-swap="outerHTML">
                <i class="bi bi-pencil small"></i>
            </button>
            <button class="btn btn-sm btn-light border py-0 px-1 text-danger"
                    hx-delete="{% url 'itempool:outcome_delete' oc.id %}"
                    hx-target="#outcome-{{ oc.id }}"
                    hx-swap="outerHTML"
                    hx-confirm="Emin misiniz?">
                <i class="bi bi-trash small"></i>
            </button>
        </div>
    </td>
</tr>
