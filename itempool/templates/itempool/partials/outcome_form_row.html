<tr id="outcome-{{ oc.id }}-edit">
    <td colspan="5" class="p-1">
        <form hx-post="{% url 'itempool:outcome_edit' oc.id %}" hx-target="#outcome-{{ oc.id }}-edit" hx-swap="outerHTML" class="row gx-1 align-items-center m-0 bg-light border rounded">
            {% csrf_token %}
            <div class="col-md-1">
                <input type="number" name="order" class="form-control form-control-sm" value="{{ form.order.value|default:'' }}" placeholder="Sıra">
            </div>
            <div class="col-md-2">
                <input type="text" name="code" class="form-control form-control-sm" value="{{ form.code.value|default:'' }}" placeholder="Kod">
            </div>
            <div class="col-md-5">
                <input type="text" name="description" class="form-control form-control-sm" value="{{ form.description.value|default:'' }}" placeholder="Açıklama">
            </div>
            <div class="col-md-2">
                {{ form.level }}
            </div>
            <div class="col-md-2 d-flex gap-1 justify-content-end">
                <button type="submit" class="btn btn-sm btn-success py-0 px-1"><i class="bi bi-check"></i></button>
                <button type="button" class="btn btn-sm btn-secondary py-0 px-1"
                        hx-get="{% url 'itempool:outcome_row' oc.id %}"
                        hx-target="#outcome-{{ oc.id }}-edit"
                        hx-swap="outerHTML">
                    <i class="bi bi-x"></i>
                </button>
            </div>
        </form>
    </td>
</tr>
