{% extends 'base.html' %}

{% block title %}Kayıt Ol - OptikForm{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card">
            <div class="card-header text-center py-3">
                <h4 class="mb-0"><i class="bi bi-person-plus me-2"></i>Kayıt Ol</h4>
            </div>
            <div class="card-body p-4">
                <div class="alert alert-info mb-4">
                    <i class="bi bi-info-circle me-2"></i>
                    Kayıt sonrası admin onayı gereklidir. Onaylandıktan sonra giriş yapabilirsiniz.
                </div>

                <form method="post">
                    {% csrf_token %}

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="first_name" class="form-label">Ad</label>
                            <input type="text" class="form-control" id="first_name" name="first_name"
                                value="{{ first_name }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="last_name" class="form-label">Soyad</label>
                            <input type="text" class="form-control" id="last_name" name="last_name"
                                value="{{ last_name }}">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="username" class="form-label">Kullanıcı Adı <span
                                class="text-danger">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" class="form-control" id="username" name="username" value="{{ username }}"
                                required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label">E-posta <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                            <input type="email" class="form-control" id="email" name="email" value="{{ email }}"
                                required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">Şifre <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" class="form-control" id="password" name="password" minlength="8"
                                required>
                        </div>
                        <div class="form-text">En az 8 karakter olmalıdır.</div>
                    </div>

                    <div class="mb-4">
                        <label for="password_confirm" class="form-label">Şifre Tekrar <span
                                class="text-danger">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                            <input type="password" class="form-control" id="password_confirm" name="password_confirm"
                                required>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-2">
                        <i class="bi bi-person-plus me-2"></i>Kayıt Ol
                    </button>
                </form>
            </div>
            <div class="card-footer text-center py-3 bg-light">
                <span class="text-muted">Zaten hesabınız var mı?</span>
                <a href="{% url 'login' %}" class="ms-2">Giriş Yap</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
